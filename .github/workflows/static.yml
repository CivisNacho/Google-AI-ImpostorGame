name: Deploy Node App
on:
  push:
    branches: ["main"] # Se ejecuta cada vez que subes algo a main
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - run: npm run build # Aquí se crea la carpeta 'dist' o 'build'
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # IMPORTANTE: Cambia 'dist' por 'build' si usas React antiguo
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
